<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חשבון בשבילים - שברים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f0fdf4; }
        .num-box { width: 60px; height: 60px; text-align: center; border: 3px solid #cbd5e1; border-radius: 12px; font-size: 1.8rem; font-weight: bold; background: white; }
        .num-box:focus { border-color: #22c55e; outline: none; background-color: #f0fdf4; }
        .fraction-line { height: 4px; background-color: #334155; width: 60px; border-radius: 2px; }
        .explanation-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow p-4 mb-4 flex justify-between items-center border border-green-100">
        <select id="level-selector" onchange="jumpToLevel(this.value)" class="bg-green-50 p-2 rounded-lg font-bold text-green-800 outline-none border border-green-200">
            <option value="1">שלב 1: זיהוי שבר (ויזואלי)</option>
            <option value="2">שלב 2: למספר מעורב</option>
            <option value="3">שלב 3: חיבור וחיסור</option>
            <option value="4">שלב 4: בעיות מילוליות</option>
        </select>
        <div id="stars-display" class="text-xl font-bold text-amber-500 bg-amber-50 px-3 py-1 rounded-full border border-amber-200">⭐ 0</div>
    </div>

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-lg p-6 border border-slate-100 min-h-[450px] flex flex-col items-center">
        <div id="progress-text" class="text-sm font-bold text-slate-400 mb-2"></div>
        
        <h2 id="instruction" class="text-2xl font-bold text-slate-800 mb-4 text-center min-h-[60px] flex items-center justify-center"></h2>

        <div id="visual-display" class="mb-6 flex justify-center items-center gap-4 min-h-[120px] flex-wrap"></div>

        <div id="exercise-ui" class="flex flex-col items-center gap-6 w-full">
            <div id="input-fields" class="flex items-center gap-4 justify-center w-full"></div>
            <button id="check-btn" onclick="validate()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl text-xl font-bold shadow-md active:scale-95 transition-all">בדקי תשובה</button>
        </div>

        <div id="feedback" class="mt-6 w-full hidden">
            <div id="feedback-msg" class="p-4 rounded-xl text-center font-bold mb-4 text-lg"></div>
            <div id="explanation-box" class="bg-blue-50 border-2 border-blue-200 p-4 rounded-xl text-blue-900 hidden explanation-card">
                <h4 class="font-bold mb-2 flex items-center gap-2"><span>💡</span> איך פותרים?</h4>
                <p id="explanation-text" class="text-lg leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        let gameState = {
            level: parseInt(localStorage.getItem('f_level')) || 1,
            subLevel: parseInt(localStorage.getItem('f_sub')) || 0,
            stars: parseInt(localStorage.getItem('f_stars')) || 0,
            current: null
        };

        function save() {
            localStorage.setItem('f_level', gameState.level);
            localStorage.setItem('f_sub', gameState.subLevel);
            localStorage.setItem('f_stars', gameState.stars);
            document.getElementById('stars-display').innerText = `⭐ ${gameState.stars}`;
            document.getElementById('level-selector').value = gameState.level;
            document.getElementById('progress-text').innerText = `תרגיל ${gameState.subLevel + 1} מתוך 5`;
        }

        function jumpToLevel(l) {
            gameState.level = parseInt(l);
            gameState.subLevel = 0;
            save();
            renderLevel();
        }

        function renderLevel() {
            const visual = document.getElementById('visual-display');
            const inputs = document.getElementById('input-fields');
            const instruct = document.getElementById('instruction');
            const feedback = document.getElementById('feedback');
            
            feedback.classList.add('hidden');
            visual.innerHTML = "";
            inputs.innerHTML = "";

            if (gameState.level === 1) {
                instruct.innerText = "איזה שבר מיוצג בציור?";
                let den = [2,3,4,5,6,8][Math.floor(Math.random()*6)];
                let num = Math.floor(Math.random() * (den - 1)) + 1;
                gameState.current = { num, den, whole: 0, type: 'visual' };
                
                // Randomly choose circle or rectangle
                if (Math.random() > 0.5) drawCircle(num, den);
                else drawRect(num, den);
                
                createFractionInput(false);
            } 
            else if (gameState.level === 2) {
                instruct.innerText = "הפכי את השבר המדומה למספר מעורב:";
                let den = Math.floor(Math.random() * 3) + 3; // 3 to 5
                let whole = Math.floor(Math.random() * 2) + 1; // 1 to 2
                let rem = Math.floor(Math.random() * (den - 1)) + 1;
                let totalNum = (whole * den) + rem;
                gameState.current = { num: rem, den: den, whole: whole, promptNum: totalNum, type: 'mixed' };
                visual.innerHTML = `<div class="text-5xl font-bold text-green-600 tracking-widest">${totalNum}/${den}</div>`;
                createFractionInput(true);
            }
            else if (gameState.level === 3) {
                let den = Math.floor(Math.random() * 5) + 4; // 4 to 8
                let isAddition = Math.random() > 0.5;
                
                if (isAddition) {
                    let n1 = Math.floor(Math.random() * (den/2)) + 1;
                    let n2 = Math.floor(Math.random() * (den/2)) + 1;
                    gameState.current = { num: n1 + n2, den: den, whole: 0, n1, n2, op: '+' };
                    instruct.innerText = "פתרי את תרגיל החיבור:";
                    visual.innerHTML = `<div class="text-4xl font-bold text-slate-700" dir="ltr">${n1}/${den} + ${n2}/${den} = ?</div>`;
                } else {
                    let n1 = Math.floor(Math.random() * (den-2)) + 2; // at least 2
                    let n2 = Math.floor(Math.random() * (n1-1)) + 1; // less than n1
                    gameState.current = { num: n1 - n2, den: den, whole: 0, n1, n2, op: '-' };
                    instruct.innerText = "פתרי את תרגיל החיסור:";
                    visual.innerHTML = `<div class="text-4xl font-bold text-slate-700" dir="ltr">${n1}/${den} - ${n2}/${den} = ?</div>`;
                }
                createFractionInput(false);
            }
            else if (gameState.level === 4) {
                instruct.innerText = "קראי את הסיפור ופתרי:";
                const names = ["רוני", "נועם", "מאיה", "אורי"];
                const name = names[Math.floor(Math.random()*names.length)];
                let den = Math.floor(Math.random() * 4) + 4; // 4 to 7
                let isAddition = Math.random() > 0.5;
                
                if (isAddition) {
                    let n1 = Math.floor(Math.random() * (den-2)) + 1;
                    let n2 = Math.floor(Math.random() * (den-n1-1)) + 1;
                    gameState.current = { num: n1 + n2, den: den, whole: 0, op: '+', n1, n2 };
                    visual.innerHTML = `<div class="text-xl text-right p-4 bg-slate-50 rounded-lg border border-slate-200">ל${name} היו <b>${n1}/${den}</b> של חפיסת שוקולד. חבר נתן לו עוד <b>${n2}/${den}</b>.<br><br>כמה שוקולד יש ל${name} עכשיו?</div>`;
                } else {
                    let n1 = Math.floor(Math.random() * (den-2)) + 2;
                    let n2 = Math.floor(Math.random() * (n1-1)) + 1;
                    gameState.current = { num: n1 - n2, den: den, whole: 0, op: '-', n1, n2 };
                    visual.innerHTML = `<div class="text-xl text-right p-4 bg-slate-50 rounded-lg border border-slate-200">ל${name} היו <b>${n1}/${den}</b> של פיצה. הוא אכל <b>${n2}/${den}</b>.<br><br>כמה פיצה נשארה ל${name}?</div>`;
                }
                createFractionInput(false);
            }
        }

        // --- Visual Functions ---
        function drawCircle(num, den) {
            let html = `<svg viewBox="0 0 100 100" class="w-32 h-32 drop-shadow-md">
                <circle cx="50" cy="50" r="48" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />`;
            for (let i = 0; i < den; i++) {
                const start = (i * 360) / den;
                const end = ((i + 1) * 360) / den;
                const x1 = 50 + 48 * Math.cos((Math.PI * (start-90)) / 180);
                const y1 = 50 + 48 * Math.sin((Math.PI * (start-90)) / 180);
                const x2 = 50 + 48 * Math.cos((Math.PI * (end-90)) / 180);
                const y2 = 50 + 48 * Math.sin((Math.PI * (end-90)) / 180);
                let fill = i < num ? '#f59e0b' : 'transparent'; // Orange for Pizza
                html += `<path d="M50,50 L${x1},${y1} A48,48 0 0,1 ${x2},${y2} Z" fill="${fill}" stroke="#cbd5e1" stroke-width="1.5" />`;
            }
            html += `</svg>`;
            document.getElementById('visual-display').innerHTML = html;
        }

        function drawRect(num, den) {
            let html = `<svg viewBox="0 0 ${den*30} 40" class="h-16 drop-shadow-md rounded-sm">`;
            for(let i=0; i<den; i++) {
                let fill = i < num ? '#8b5a2b' : '#f1f5f9'; // Brown for chocolate
                html += `<rect x="${i*30}" y="0" width="30" height="40" fill="${fill}" stroke="#ffffff" stroke-width="2" />`;
            }
            html += `</svg>`;
            document.getElementById('visual-display').innerHTML = html;
        }
        // ------------------------

        function createFractionInput(withWhole) {
            let html = "";
            if (withWhole) {
                html += `<div class="flex flex-col items-center"><span class="text-sm text-slate-500 mb-1">שלמים</span><input id="ans-w" type="number" class="num-box"></div>`;
            }
            html += `<div class="flex flex-col items-center gap-2">
                        <span class="text-sm text-slate-500 -mb-1">מונה (חלקים)</span>
                        <input id="ans-n" type="number" class="num-box">
                        <div class="fraction-line"></div>
                        <input id="ans-d" type="number" class="num-box">
                        <span class="text-sm text-slate-500 -mt-1">מכנה (סה"כ)</span>
                     </div>`;
            document.getElementById('input-fields').innerHTML = html;
        }

        function validate() {
            const uN = parseInt(document.getElementById('ans-n').value) || 0;
            const uD = parseInt(document.getElementById('ans-d').value) || 0;
            const uW = parseInt(document.getElementById('ans-w')?.value || 0);
            const feedback = document.getElementById('feedback');
            const msg = document.getElementById('feedback-msg');
            const exp = document.getElementById('explanation-box');

            if (uN === gameState.current.num && uD === gameState.current.den && uW === gameState.current.whole) {
                msg.innerText = "אלופה! תשובה נכונה! 🎉";
                msg.className = "p-4 rounded-xl text-center font-bold mb-4 bg-green-100 text-green-700 text-xl border-2 border-green-300";
                gameState.stars += 10;
                gameState.subLevel++;
                exp.classList.add('hidden');
                
                setTimeout(() => {
                    if (gameState.subLevel >= 5) {
                        gameState.level = Math.min(4, gameState.level + 1);
                        gameState.subLevel = 0;
                    }
                    save();
                    renderLevel();
                }, 1800);
            } else {
                msg.innerText = "כמעט... בואי נבדוק ביחד איפה הטעות.";
                msg.className = "p-4 rounded-xl text-center font-bold mb-4 bg-red-100 text-red-700 text-xl border-2 border-red-300";
                exp.classList.remove('hidden');
                setExplanation();
            }
